name: ci

on:
  push:
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      cause:
        description: 'Reason'
        required: true
        default: 'Manual triggering'

jobs:
  vscroll_ci:
    name: VScroll CI
    runs-on: ubuntu-latest
    steps:
      - name: Dispatched?
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          echo "This is dispatched"
          echo "Reason: ${{ github.event.inputs.cause }}"

      - name: Checkout
        uses: actions/checkout@v3

      - name: Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build vscroll
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: E2e tests
        run: |
          npx playwright install
          npx playwright test initialization.spec.ts

      - name: Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: dist
          path: dist
